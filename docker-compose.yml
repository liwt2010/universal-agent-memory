services:
  # --- SQLite only (default) ---
  uams:
    build: .
    ports:
      - "3111:3111"
    environment:
      - UAMS_LOG_LEVEL=INFO
      - UAMS_STORAGE_BACKEND=sqlite
      - UAMS_SQLITE_PATH=/data/uams.db
      - UAMS_HEALTH_PORT=3111
      # - UAMS_STORAGE_BACKEND=redis
      # - UAMS_REDIS_HOST=redis
      # - UAMS_REDIS_PORT=6379
      # - UAMS_REDIS_DB=0
      # - UAMS_REDIS_PUBSUB=true
      # - UAMS_STORAGE_BACKEND=neo4j
      # - UAMS_NEO4J_URI=bolt://neo4j:7687
      # - UAMS_NEO4J_USER=neo4j
      # - UAMS_NEO4J_PASSWORD=uams_password
    volumes:
      - uams-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3111/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # --- Redis (optional, for distributed caching + pub/sub) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # --- Neo4j (optional, for graph storage) ---
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/uams_password
      - NEO4J_PLUGINS=["apoc"]
      # Increase memory for production workloads
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7474"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  uams-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
